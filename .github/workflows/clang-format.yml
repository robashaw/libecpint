name: clang-format

on:
  pull_request:
    paths:
      - '**.cpp'
      - '**.hpp'

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src include -name '*.cpp' -o -name '*.hpp' \
            | xargs clang-format --dry-run --Werror
